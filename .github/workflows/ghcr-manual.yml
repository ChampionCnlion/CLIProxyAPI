name: ghcr-manual

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to canary-<short_sha>.
        required: false
        type: string
      push_canary_latest:
        description: Also publish ghcr.io/<owner>/cliproxyapi:canary-latest
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  APP_NAME: CLIProxyAPI

jobs:
  build-ghcr-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        id: meta
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lc}/cliproxyapi"
          version_input="${{ inputs.image_tag }}"
          if [ -n "${version_input}" ]; then
            version="${version_input}"
          else
            version="canary-${GITHUB_SHA::7}"
          fi
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "commit=${commit}" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}

      - name: Tag canary-latest
        if: ${{ inputs.push_canary_latest }}
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.image }}:canary-latest" \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
